services:
    db:
        image: postgres:16
        container_name: pizzaro-db
        restart: unless-stopped
        volumes:
            - db_data:/var/lib/postgresql/data
        env_file:
            - .env
        ports:
            - '5432:5432'

        frontend:
            container_name: pizzaro-frontend
            restart: unless-stopped
            build:
                context: ./frontend
                dockerfile: .Dockerfile
            ports:
                - '3000:3000'
            env_file:
                - .env
            depends_on:
                - db
            volumes:
                - pizzaro_public:/usr/app/public # Том для хранения картинок

        nginx:
            image: nginx:stable
            container_name: pizzaro-nginx
            restart: unless-stopped
            ports:
                - '80:80'
                - '443:443'
            volumes:
                - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                - pizzaro_public:/usr/share/nginx/html/public # Проброс картинок в nginx
            depends_on:
                - frontend

volumes:
    db_data:
    pizzaro_public:
